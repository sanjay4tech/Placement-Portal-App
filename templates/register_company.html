<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Company Registration - Placement Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="theme-body">

<nav class="navbar navbar-expand-lg theme-header navbar-dark mb-3">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
            Placement Portal
        </a>
        <a class="btn btn-outline-light btn-sm"
           href="{{ url_for('sign_in') }}">Back to Login</a>
    </div>
</nav>

<div class="container my-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-3">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="row justify-content-center">
        <div class="col-md-9">
            <div class="card theme-card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Company Registration</h4>

                    <form method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Company Name</label>
                                <input type="text" name="company_name"
                                       class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact Person</label>
                                <input type="text" name="contact_person"
                                       class="form-control">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact Email</label>
                                <input type="email" name="contact_email"
                                       class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact Phone</label>
                                <input type="text" name="contact_phone"
                                       class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Website</label>
                            <input type="text" name="website_url"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Company Overview</label>
                            <textarea name="description" rows="3"
                                      class="form-control"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password"
                                       class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" name="confirm_password"
                                       class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Register
                        </button>
                        <a href="{{ url_for('sign_in') }}"
                           class="btn btn-link">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="theme-footer text-center py-2 mt-3">
    <small>&copy; {{ 2026 }} Placement Portal.</small>
</footer>

</body>
</html>

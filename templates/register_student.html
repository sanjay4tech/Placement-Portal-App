<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Student Registration - Placement Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="theme-body d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg theme-header navbar-dark mb-3">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
            Placement Portal
        </a>
        <a class="btn btn-outline-light btn-sm"
           href="{{ url_for('sign_in') }}">Back to Login</a>
    </div>
</nav>

<main class="container my-4 flex-grow-1">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-3">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card theme-card shadow-sm">
                <div class="card-body">
                    <h4 class="mb-3">Student Registration</h4>

                    <form method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" name="full_name" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Department</label>
                                <input type="text" name="department" class="form-control">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Phone</label>
                                <input type="text" name="phone" class="form-control" required>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">CGPA</label>
                                <input type="text" name="cgpa" class="form-control">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" name="confirm_password" class="form-control" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Register
                        </button>
                        <a href="{{ url_for('sign_in') }}"
                           class="btn btn-link">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

</main>

<footer class="theme-footer text-center py-2 mt-3">
    <small>&copy; {{ 2026 }} Placement Portal.</small>
</footer>

</body>
</html>
